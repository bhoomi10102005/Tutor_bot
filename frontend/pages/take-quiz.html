<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Take Quiz | Tutor Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/app.css">
  <script src="../config.js"></script>
  <style>
    .quiz-shell {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      gap: 24px;
      padding-bottom: 32px;
    }

    .quiz-sidebar.card,
    .quiz-stage.card {
      margin-bottom: 0;
    }

    .quiz-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .quiz-list-item {
      width: 100%;
      text-align: left;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(29, 35, 53, 0.1);
      background: linear-gradient(180deg, rgba(250, 245, 235, 0.9), #ffffff);
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
      font: inherit;
      color: var(--ink);
    }

    .quiz-list-item:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 118, 110, 0.34);
      box-shadow: var(--shadow-soft);
    }

    .quiz-list-item.active {
      border-color: rgba(15, 118, 110, 0.5);
      background: linear-gradient(180deg, rgba(15, 118, 110, 0.08), rgba(255, 255, 255, 0.98));
    }

    .quiz-list-title {
      font-size: 0.97rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .quiz-list-meta {
      margin-top: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .quiz-stage-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .quiz-stage-title {
      margin: 0;
      font-family: "Sora", sans-serif;
      font-size: 1.3rem;
      line-height: 1.3;
    }

    .quiz-stage-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .quiz-meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .meta-tile {
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--bg-soft);
      border: 1px solid rgba(29, 35, 53, 0.08);
    }

    .meta-tile-label {
      display: block;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-tile-value {
      display: block;
      margin-top: 4px;
      font-size: 1rem;
      font-weight: 700;
    }

    .question-card {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(29, 35, 53, 0.1);
      background: linear-gradient(180deg, rgba(250, 245, 235, 0.82), #ffffff);
    }

    .question-card + .question-card {
      margin-top: 16px;
    }

    .question-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .question-card-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.55;
    }

    .question-card-meta {
      font-size: 0.84rem;
      color: var(--muted);
    }

    .option-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .option-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(29, 35, 53, 0.1);
      background: #fff;
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease;
    }

    .option-label:hover {
      border-color: rgba(15, 118, 110, 0.34);
      background: rgba(15, 118, 110, 0.04);
    }

    .option-label input {
      margin-top: 2px;
      accent-color: var(--brand);
    }

    .attempt-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(15, 118, 110, 0.06);
      border: 1px solid rgba(15, 118, 110, 0.16);
    }

    .attempt-timer {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--brand-deep);
    }

    .submit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .result-summary {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    .summary-block {
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(29, 35, 53, 0.1);
      background: var(--bg-soft);
    }

    .summary-block h3 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      font-family: "Sora", sans-serif;
    }

    .summary-block p,
    .summary-block ul {
      margin: 0;
      color: var(--ink);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .summary-block ul {
      padding-left: 18px;
    }

    .review-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.32rem 0.72rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .review-badge.correct {
      background: rgba(15, 118, 110, 0.12);
      color: var(--brand-deep);
    }

    .review-badge.incorrect {
      background: rgba(161, 55, 22, 0.1);
      color: #a13716;
    }

    .review-badge.unanswered {
      background: rgba(180, 83, 9, 0.12);
      color: var(--accent);
    }

    .review-line {
      margin-top: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .empty-stage {
      padding: 56px 20px;
      border-radius: 18px;
      border: 1px dashed rgba(29, 35, 53, 0.18);
      background: rgba(250, 245, 235, 0.68);
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 1080px) {
      .quiz-shell {
        grid-template-columns: 1fr;
      }

      .quiz-meta-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .quiz-meta-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="app-page">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../index.html">
        <span class="brand-mark">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="10" fill="url(#brand-grad-qt)"/>
            <path d="M10 20l4-5 4 3 4-7" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="10" cy="20" r="1.8" fill="#fff"/>
            <circle cx="14" cy="15" r="1.8" fill="#fff"/>
            <circle cx="18" cy="18" r="1.8" fill="#fff"/>
            <circle cx="22" cy="11" r="1.8" fill="#fff"/>
            <defs>
              <linearGradient id="brand-grad-qt" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#0f766e"/>
                <stop offset="100%" stop-color="#095850"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="brand-name">Tutor Bot</span>
      </a>
      <div class="topbar-actions">
        <div class="nav-user">
          <span class="user-avatar" data-user-slot></span>
          <button class="button button-danger" type="button" data-signout>Sign Out</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="subnav">
    <div class="container subnav-inner">
      <a class="subnav-link" href="./documents.html">Documents</a>
      <a class="subnav-link" href="./chat.html">Chat</a>
      <a class="subnav-link" href="./create-quiz.html">Create Quiz</a>
      <a class="subnav-link active" href="./take-quiz.html">Take Quiz</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Take Quiz</h1>
      <p>Select a saved quiz, start an attempt, submit your answers, and review the feedback.</p>
    </div>

    <div class="quiz-shell">
      <aside class="quiz-sidebar card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <div>
            <h2 class="card-title" style="margin:0;">Your Quizzes</h2>
            <p class="card-desc" style="margin:6px 0 0;">Newest quizzes appear first.</p>
          </div>
          <button class="button button-ghost" id="refresh-quizzes-btn" type="button" style="padding:0.42rem 0.9rem;font-size:0.84rem;">Refresh</button>
        </div>
        <div id="quiz-list" class="quiz-list">
          <p class="empty-state" style="padding:24px 0;">Loading...</p>
        </div>
      </aside>

      <section id="quiz-stage" class="quiz-stage card">
        <div class="empty-stage">
          Select a quiz from the left to start.
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="../assets/js/take-quiz.js"></script>
</body>
</html>
